name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Extrair versão do .csproj
        id: ver
        shell: pwsh
        run: |
          $xml     = [xml](Get-Content EcoUtils.csproj)
          $version = ($xml.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Versão detectada: $version"

      - name: Verificar se a versão já foi publicada
        id: check
        shell: pwsh
        run: |
          $tag    = "v${{ steps.ver.outputs.VERSION }}"
          $exists = git tag -l $tag
          $result = if ($exists) { "true" } else { "false" }
          "TAG_EXISTS=$result" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Tag $tag existe: $result"

      - name: Setup .NET
        if: steps.check.outputs.TAG_EXISTS == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publicar (self-contained, single-file)
        if: steps.check.outputs.TAG_EXISTS == 'false'
        run: >
          dotnet publish EcoUtils.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-output

      - name: Criar GitHub Release
        if: steps.check.outputs.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: EcoUtils v${{ steps.ver.outputs.VERSION }}
          generate_release_notes: true
          files: publish-output/EcoUtils.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
